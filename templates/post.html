{% extends "layout.html" %}

{% block content %}

<article class="content-section py-3 px-4 mb-4">

    <div class="d-flex align-items-start gap-4">

        <img
            class="rounded-circle article-img flex-shrink-0"
            src="{{ url_for('static', path='samuel.jpg') }}"
            alt="{{ post.author }}"
            width="64"
            height="64"
            loading="lazy">

        <div class="flex-grow-1">

            <div class="article-metadata mb-2">

                <a class="me-2" href="#">
                    {{ post.author }}
                </a>

                <small class="text-body-secondary">
                    {{ post.date_posted }}
                </small>

            </div>

            <h2 class="article-title">
                {{ post.title }}
            </h2>

            <p class="article-content">
                {{ post.content }}
            </p>

            <div class="post-actions mt-3 pt-3 border-top">

                <a class="btn btn-outline-secondary me-2" href="#">
                    Edit Post
                </a>

                <button
                    type="button"
                    class="btn btn-outline-danger"
                    data-bs-toggle="modal"
                    data-bs-target="#deleteModal">

                    Delete Post

                </button>

            </div>

        </div>

    </div>

</article>

<!-- Delete Modal -->

<div
    class="modal fade"
    id="deleteModal"
    tabindex="-1"
    aria-labelledby="deleteModalLabel"
    aria-hidden="true">

    <div class="modal-dialog">

        <div class="modal-content">

            <div class="modal-header">

                <h5 class="modal-title" id="deleteModalLabel">
                    Delete Post?
                </h5>

                <button
                    type="button"
                    class="btn-close"
                    data-bs-dismiss="modal">
                </button>

            </div>

            <form action="#" method="post">

                <div class="modal-body">

                    Are you sure you want to delete this post?
                    This action cannot be undone.

                </div>

                <div class="modal-footer">

                    <button
                        type="button"
                        class="btn btn-secondary"
                        data-bs-dismiss="modal">

                        Cancel

                    </button>

                    <button
                        type="submit"
                        class="btn btn-danger">

                        Delete

                    </button>

                </div>

            </form>

        </div>

    </div>

</div>

{% endblock %}
